<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Asian Festival — China Wonder</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(12px);
            --text-color: #ffffff;
            --accent-color: #00e5ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #2c3e50 0%, #080b12 100%);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* 16:9 aspect ratio scaling logic */
            max-width: 177.78vh; /* 16/9 * 100 */
            max-height: 56.25vw; /* 9/16 * 100 */
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            background: transparent;
            overflow: hidden;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
        }

        /* Header */
        header {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 300;
            font-size: 24px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            pointer-events: none;
            width: 100%;
        }

        /* Info Card */
        #info-card {
            position: absolute;
            bottom: 120px;
            right: 40px;
            width: 340px;
            padding: 24px;
            z-index: 10;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #info-card.hidden {
            opacity: 0;
            transform: translateX(20px);
            pointer-events: none;
        }

        #info-card h2 {
            margin: 0 0 12px 0;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        #info-card p {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
            color: #d0d0d0;
            font-weight: 300;
        }

        /* Navigation Dock */
        #dock {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 40px;
            max-width: 90%;
        }

        .dock-btn {
            min-height: 44px;
            height: auto;
            padding: 8px 15px;
            border-radius: 22px;
            border: 2px solid transparent;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 13px;
            line-height: 1.2;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            white-space: normal;
            text-align: center;
            max-width: 130px;
        }

        .dock-btn:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
        }

        .dock-btn.active {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            transform: scale(1.1);
        }

        /* HUD Controls */
        .hud {
            position: absolute;
            bottom: 30px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        .hud-left { left: 40px; }
        .hud-right { right: 40px; }

        .hud-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 18px;
        }

        .hud-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        /* Loading overlay */
        #loader {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #2c3e50 0%, #080b12 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Mobile Responsiveness */
        @media (max-width: 768px), (max-aspect-ratio: 1/1) {
            #app-container {
                max-width: 100vw;
                max-height: 100vh;
            }
            header {
                font-size: 15px;
                top: 15px;
                letter-spacing: 2px;
            }
            #dock {
                bottom: 80px;
                padding: 8px;
                border-radius: 20px;
                gap: 6px;
                max-width: 95%;
            }
            .dock-btn {
                padding: 4px 10px;
                font-size: 11px;
                line-height: 1.1;
                min-height: 34px;
                max-width: 90px;
            }
            #info-card {
                top: 60px;
                bottom: auto;
                right: 50%;
                transform: translateX(50%);
                width: 90%;
                padding: 15px;
                z-index: 5;
            }
            #info-card.hidden {
                transform: translate(50%, -20px);
            }
            .hud {
                bottom: 20px;
            }
            .hud-left { left: 15px; }
            .hud-right { right: 15px; }
            .hud-btn {
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Loader -->
        <div id="loader">
            <div class="spinner"></div>
            <div style="letter-spacing: 2px; font-weight: 300;">LOADING ASSET...</div>
        </div>

        <div id="canvas-container"></div>

        <header>2026 Asian Festival &mdash; China Wonder</header>

        <div id="info-card" class="glass-panel">
            <h2 id="asset-title">Asset Title</h2>
            <p id="asset-desc">Description loading...</p>
        </div>

        <div id="dock" class="glass-panel">
            <!-- Buttons injected by JS -->
        </div>

        <div class="hud hud-left">
            <button class="hud-btn" id="btn-rotate" title="Toggle Auto-Rotate">↻</button>
            <button class="hud-btn" id="btn-zoom-in" title="Zoom In">＋</button>
            <button class="hud-btn" id="btn-zoom-out" title="Zoom Out">－</button>
        </div>

        <div class="hud hud-right">
            <button class="hud-btn" id="btn-info" title="Toggle Info">i</button>
            <button class="hud-btn" id="btn-reset" title="Reset Camera">⌂</button>
        </div>
    </div>

    <!-- Import Map for Three.js -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const models = [
            // Terracotta Group
            { id: 'terracotta-horse', name: 'Terracotta Horse', shortName: 'Horse', path: 'model/terracotta_horse_-_high_resolution.glb', desc: 'A highly detailed 3D scan of a terracotta horse from the famous Terracotta Army of Qin Shi Huang. The intricate details showcase the remarkable craftsmanship of the era.' },
            { id: 'terracotta-warrior-2', name: 'Terracotta Warrior', shortName: 'Warrior', path: 'model/terracotta_warrior_2_3dst40.glb', desc: 'A detailed look at an individual terracotta warrior. Each figure in the army is distinct, with unique facial features, hairstyles, and armor, highlighting the individuality of the soldiers.' },
            { id: 'terracotta-warriors', name: 'Terracotta Army', shortName: 'Army', path: 'model/qin_terracotta_warriors_and_horses-medium.glb', desc: 'A medium-resolution scan featuring warriors and horses from the grand Terracotta Army, an expansive collection of funerary art buried with the emperor in 210–209 BCE.' },
            // Great Wall Group
            { id: 'great-wall-14th', name: '14th C. Great Wall', shortName: 'Wall (14th C.)', path: 'model/14th_century_great_wall.glb', desc: 'A segment of the Great Wall of China built during the 14th century (Ming Dynasty). The Ming walls are the most famous and best-preserved sections of this incredible architectural feat.' },
            { id: 'great-wall-survey', name: 'Great Wall Survey', shortName: 'Wall Survey', path: 'model/great_wall_survey.glb', desc: 'A comprehensive 3D survey model of a section of the Great Wall. This model provides an expansive view of how the wall traverses the rugged mountainous terrain.' },
            // Others
            { id: 'potala-guanyin', name: 'Potala Guanyin', shortName: 'Guanyin', path: 'model/1965.556_potala_guanyin.glb', desc: 'A stunning representation of Guanyin, the bodhisattva of compassion, associated with the Potala Palace in Tibet. Such artifacts hold immense spiritual and cultural significance.' },
            { id: 'imperial-building', name: 'Imperial Building', shortName: 'Imperial Bldg', path: 'model/small_chinese_imperial_style_building.glb', desc: 'A small-scale architectural model showcasing the elegant and distinctive features of traditional Chinese imperial style, characterized by sweeping roofs, intricate brackets, and vibrant colors.' },
            { id: 'shanghai-city', name: 'Shanghai Sandbox', shortName: 'Shanghai', path: 'model/city-_shanghai-sandboxie.glb', desc: 'A sandbox-style city model representing the bustling metropolis of Shanghai. It highlights the modern skyline and rapid urban development of one of China\'s largest cities.' }
        ];

        let scene, camera, renderer, controls, currentModel;
        let lastInteractionTime = Date.now();
        const IDLE_TIMEOUT = 30000; // 30 seconds
        const loaderEl = document.getElementById('loader');

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            // Scene setup
            scene = new THREE.Scene();
            scene.background = null;

            // Camera setup
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.1; // allow slightly below ground
            controls.minDistance = 1;
            controls.maxDistance = 20;

            // Track interactions for idle timer
            controls.addEventListener('start', resetIdleTimer);
            renderer.domElement.addEventListener('pointerdown', resetIdleTimer);
            renderer.domElement.addEventListener('wheel', resetIdleTimer);

            // Lighting
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(5, 10, 5);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 5;
            dirLight.shadow.camera.bottom = -5;
            dirLight.shadow.camera.left = -5;
            dirLight.shadow.camera.right = 5;
            dirLight.shadow.bias = -0.001;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // Shadow Catcher Plane
            const planeGeometry = new THREE.PlaneGeometry(100, 100);
            const shadowMaterial = new THREE.ShadowMaterial({ opacity: 0.6 });
            const plane = new THREE.Mesh(planeGeometry, shadowMaterial);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = 0;
            plane.receiveShadow = true;
            scene.add(plane);

            // Interactive Ring
            const ringGeometry = new THREE.RingGeometry(1.5, 1.55, 64);
            const ringMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x00e5ff, 
                side: THREE.DoubleSide, 
                transparent: true, 
                opacity: 0.4 
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = 0.01; // slightly above floor
            scene.add(ring);

            // Build UI
            buildDock();
            setupHUD();

            // Load Initial Model
            loadModel(models[0]);

            window.addEventListener('resize', onWindowResize);
            onWindowResize();
        }

        function buildDock() {
            const dock = document.getElementById('dock');
            models.forEach((m, index) => {
                const btn = document.createElement('button');
                btn.className = 'dock-btn';
                btn.textContent = m.name;
                btn.title = m.name;
                btn.onclick = () => {
                    document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadModel(m);
                };
                if (index === 0) btn.classList.add('active');
                dock.appendChild(btn);
            });
        }

        function setupHUD() {
            document.getElementById('btn-info').onclick = () => {
                document.getElementById('info-card').classList.toggle('hidden');
            };
            document.getElementById('btn-reset').onclick = () => {
                resetIdleTimer();
                camera.position.set(0, 2, 5);
                controls.target.set(0, 0, 0);
                controls.update();
            };
            document.getElementById('btn-rotate').onclick = () => {
                controls.autoRotate = !controls.autoRotate;
            };
            document.getElementById('btn-zoom-in').onclick = () => {
                const targetZoom = controls.target.distanceTo(camera.position) * 0.8;
                const dir = camera.position.clone().sub(controls.target).normalize();
                camera.position.copy(controls.target).add(dir.multiplyScalar(targetZoom));
            };
            document.getElementById('btn-zoom-out').onclick = () => {
                const targetZoom = controls.target.distanceTo(camera.position) * 1.2;
                const dir = camera.position.clone().sub(controls.target).normalize();
                camera.position.copy(controls.target).add(dir.multiplyScalar(targetZoom));
            };
        }

        function loadModel(modelData) {
            loaderEl.style.opacity = '1';
            loaderEl.style.pointerEvents = 'all';

            document.getElementById('asset-title').textContent = modelData.name;
            document.getElementById('asset-desc').textContent = modelData.desc;

            if (currentModel) {
                scene.remove(currentModel);
                currentModel.traverse((child) => {
                    if (child.isMesh) {
                        child.geometry.dispose();
                        if (child.material.isMaterial) {
                            child.material.dispose();
                        } else {
                            for (const material of child.material) material.dispose();
                        }
                    }
                });
            }

            const loader = new GLTFLoader();
            loader.load(modelData.path, (gltf) => {
                currentModel = gltf.scene;

                const box = new THREE.Box3().setFromObject(currentModel);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());

                const maxDim = Math.max(size.x, size.y, size.z);
                // Reduce target size so wide models don't clip outside the screen
                const scale = 1.6 / maxDim;
                currentModel.scale.setScalar(scale);

                box.setFromObject(currentModel);
                box.getCenter(center);
                currentModel.position.sub(center);
                currentModel.position.y += (size.y * scale) / 2;

                currentModel.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });

                scene.add(currentModel);
                
                setTimeout(() => {
                    loaderEl.style.opacity = '0';
                    loaderEl.style.pointerEvents = 'none';
                }, 300);

                resetIdleTimer();

            }, undefined, (error) => {
                console.error(error);
                loaderEl.style.opacity = '0';
                loaderEl.style.pointerEvents = 'none';
            });
        }

        function resetIdleTimer() {
            lastInteractionTime = Date.now();
            controls.autoRotate = false;
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            if(container && camera && renderer) {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            if (Date.now() - lastInteractionTime > IDLE_TIMEOUT) {
                controls.autoRotate = true;
                controls.autoRotateSpeed = 0.5;
            }

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
